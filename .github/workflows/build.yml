name: Build & Deploy My Billu

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ===== BUILD WEB & DEPLOY TO GITHUB PAGES =====
  build-web:
    name: 🌐 Build Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: stable
      - run: flutter pub get
      - run: dart analyze lib/ --fatal-infos || true
      - run: flutter build web --release --base-href "/My-Billu/"
      - uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/web/

  deploy-web:
    name: 🚀 Deploy to GitHub Pages
    needs: build-web
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ===== BUILD ANDROID APK =====
  build-android:
    name: 📱 Build Android APK
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: stable
      - run: flutter pub get
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: MyBillu-Android-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  # ===== BUILD WINDOWS EXE =====
  build-windows:
    name: 🖥️ Build Windows
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: stable
      - run: flutter pub get
      - run: flutter build windows --release
      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: MyBillu-Windows
          path: build/windows/x64/runner/Release/
          retention-days: 30

  # ===== CREATE RELEASE ON TAG =====
  release:
    name: 🏷️ Create Release
    needs: [build-android, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: MyBillu-Android-APK
          path: ./apk/
      - uses: softprops/action-gh-release@v2
        with:
          files: ./apk/app-release.apk
          generate_release_notes: true
