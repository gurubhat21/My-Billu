name: my_billu
description: "My Billu - Smart Billing Software for Windows & Android"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # State Management
  provider: ^6.1.2
  # Database
  sqflite: ^2.4.2
  sqflite_common_ffi: ^2.3.4+4
  path: ^1.9.1
  path_provider: ^2.1.5
  # PDF
  pdf: ^3.11.2
  printing: ^5.14.2
  # Utils
  intl: ^0.20.2
  uuid: ^4.5.1
  google_fonts: ^6.2.1
  fl_chart: ^1.0.0
  share_plus: ^10.1.4
  # Excel Import/Export
  excel: ^4.0.6
  file_picker: ^8.3.7
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
